syntax = "proto3";

package com.mikai233.protocol;

import "asteria_rpc_options.proto";
import "proto_common.proto";

enum RpcLoginResult{
  RpcLoginSuccess = 0;
  RpcLoginRegisterLimit = 1;
  RpcLoginWorldNotExists = 2;
  RpcLoginWorldClosed = 3;
  RpcLoginAccountBan = 4;
}

message RpcPlayerData{
  int64 player_id = 1;
  string nickname = 2;
}

message RpcLoginResp{
  RpcLoginResult result = 1;
  RpcPlayerData data = 2;
  bytes server_public_key = 3;
  string server_zone = 4;
}

message PlayerLoginReq{
  option (asteria.rpc.entity_id) = "player_id";
  string account = 1;
  int64 player_id = 2;
  int64 world_id = 3;
  ActorRef channel_actor = 4;
}

message PlayerLoginResp{
  RpcLoginResp response = 1;
}

message PlayerCreateReq{
  option (asteria.rpc.entity_id) = "player_id";
  string account = 1;
  int64 player_id = 2;
  int64 world_id = 3;
  string nickname = 4;
  ActorRef channel_actor = 5;
}

message PlayerCreateResp{
  RpcLoginResp response = 1;
}

message PlayerChannelClosedReq{
  option (asteria.rpc.entity_id) = "player_id";
  int64 player_id = 1;
  bool shutdown = 2;
  string shutdown_plan_id = 3;
  ActorRef coordinator_actor = 4;
}

message PlayerShutdownAck{
  int64 player_id = 1;
  string shutdown_plan_id = 2;
  bool success = 3;
  string error = 4;
}
