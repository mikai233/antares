apiVersion: v1
kind: ServiceAccount
metadata:
  name: antares
  namespace: antares
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: antares-discovery
  namespace: antares
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: antares-discovery
  namespace: antares
subjects:
  - kind: ServiceAccount
    name: antares
    namespace: antares
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: antares-discovery
