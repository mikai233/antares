apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: antares
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: zookeeper:3.9
          ports:
            - name: client
              containerPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: antares
spec:
  selector:
    app: zookeeper
  ports:
    - name: client
      port: 2181
      targetPort: client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: antares
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - name: mongodb
              containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: antares
spec:
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
