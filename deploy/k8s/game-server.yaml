apiVersion: apps/v1
kind: Deployment
metadata:
  name: player
  namespace: antares
spec:
  replicas: 1
  selector:
    matchLabels:
      app: antares
      role: player
  template:
    metadata:
      labels:
        app: antares
        role: player
    spec:
      serviceAccountName: antares
      terminationGracePeriodSeconds: 60
      containers:
        - name: player
          image: akka-game-server-player:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CLUSTER_DISCOVERY
              value: "kubernetes"
            - name: ZK_CONNECT
              value: "zookeeper:2181"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: remoting
              containerPort: 2333
            - name: metrics
              containerPort: 3333
            - name: management
              containerPort: 4333
---
