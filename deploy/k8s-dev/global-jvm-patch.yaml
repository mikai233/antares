apiVersion: apps/v1
kind: Deployment
metadata:
  name: global
  namespace: antares
spec:
  template:
    spec:
      containers:
        - name: global
          env:
            - name: JAVA_OPTS
              value: "-Xms96m -Xmx256m -XX:+ExitOnOutOfMemoryError"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
