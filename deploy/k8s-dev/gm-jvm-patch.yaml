apiVersion: apps/v1
kind: Deployment
metadata:
  name: gm
  namespace: antares
spec:
  template:
    spec:
      containers:
        - name: gm
          env:
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx384m -XX:+ExitOnOutOfMemoryError"
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
