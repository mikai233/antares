name: Gradle

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AKKA_SECURE_TOKEN: ${{ secrets.AKKA_SECURE_TOKEN }}

    steps:
      # 🧱 Checkout code
      - name: Checkout repository
        uses: actions/checkout@v7

      # ☕ Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Prepare Luban examples
        run: |
          git clone --depth 1 https://github.com/focus-creative-games/luban_examples /tmp/luban_examples

      # 🧰 Grant execution permission for Gradle Wrapper
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      # ⚡ Optional — validate Gradle wrapper integrity
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # 📦 Build the project (includes compile + assemble)
      - name: Build
        run: ./gradlew build --stacktrace --info

      # 🧪 Run unit tests
      - name: Run tests
        run: ./gradlew test --stacktrace --info

      # 🧹 Run Detekt static analysis
      - name: Run Detekt
        run: ./gradlew detekt --stacktrace --info

      # 📤 Upload test results (optional, helpful for debugging)
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: build/reports/tests/

      # 📤 Upload Detekt reports (optional)
      - name: Upload Detekt report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-report
          path: build/reports/detekt/
