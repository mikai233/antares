syntax = "proto3";

package com.mikai233.protocol;

import "asteria_rpc_options.proto";
import "client/proto_chat.proto";

message PrivateChatDeliverReq{
  option (asteria.rpc.entity_id) = "player_id";
  int64 player_id = 1;
  ChatMessageNotify message = 2;
}

message WorldChatBroadcastReq{
  option (asteria.rpc.entity_id) = "world_id";
  int64 world_id = 1;
  string topic = 2;
  repeated int64 include = 3;
  repeated int64 exclude = 4;
  ChatMessageNotify message = 5;
}

message PlayerAllianceChangedReq{
  option (asteria.rpc.entity_id) = "player_id";
  int64 player_id = 1;
  int64 alliance_id = 2;
}
